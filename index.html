document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"d9f4fb76-a633-4866-ae0b-ff1383c35d0b\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\n.it-btn{transition:background .12s,color .12s,border-color .12s;cursor:pointer}\n.it-btn:hover{background:#f1eee4}\n.it-prim:hover{background:#d8c688 !important}\n.node:hover{box-shadow:0 5px 16px rgba(0,0,0,.12)}\n.bc-step:hover{color:#1B1B1B;text-decoration:underline}\n.anno-text:empty:before{content:'Type a note…';color:#b3ab93}\n::-webkit-scrollbar{width:9px;height:9px}\n::-webkit-scrollbar-thumb{background:#cfcabb;border-radius:6px}\n::-webkit-scrollbar-track{background:transparent}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" style=\"height:100vh;display:flex;flex-direction:column;background:#F4F1EA;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#1B1B1B;overflow:hidden\">\n\n  <div style=\"flex:0 0 auto;height:16px;background:#1B1B1B\"><\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:9px;padding:8px 14px;background:#fff;border-bottom:1px solid #e6e2d8;flex:0 0 auto;z-index:5\">\n    <select id=\"pageSwitch\" title=\"Switch builder\" style=\"font-weight:700;font-size:15px;letter-spacing:.2px;margin-right:2px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;color:#1B1B1B;padding:6px 9px;cursor:pointer;font-family:inherit\">\n      <option value=\"issue\" selected=\"\">Crux Work Presets<\u002Foption>\n    <\u002Fselect>\n    <div style=\"width:1px;height:22px;background:#e6e2d8;margin:0 2px\"><\u002Fdiv>\n    <select id=\"treeSel\" style=\"padding:6px 8px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B;cursor:pointer\">\n      <optgroup label=\"Financial Issue Trees\">\n        <option value=\"roic\">ROIC Issue Tree<\u002Foption>\n        <option value=\"revenue\">Revenue<\u002Foption>\n        <option value=\"cost\">Cost<\u002Foption>\n        <option value=\"grossProfit\">Gross Profit<\u002Foption>\n        <option value=\"ebitda\">EBITDA<\u002Foption>\n        <option value=\"ebit\">EBIT / Operating Income<\u002Foption>\n        <option value=\"netIncome\">Net Income<\u002Foption>\n        <option value=\"fcf\">Free Cash Flow<\u002Foption>\n      <\u002Foptgroup>\n      <optgroup label=\"Other Presets\">\n        <option value=\"imported\">Imported Tree<\u002Foption>\n        <option value=\"sales\">Sales Example<\u002Foption>\n        <option value=\"roadmap\">Scaling Roadmap<\u002Foption>\n        <option value=\"customer\">Customer<\u002Foption>\n        <option value=\"volSegments\">Volume Segments<\u002Foption>\n        <option value=\"opsPerf\">Operational Performance<\u002Foption>\n      <\u002Foptgroup>\n      <optgroup label=\"Blank canvas\">\n        <option value=\"scratch\">Start from Scratch<\u002Foption>\n      <\u002Foptgroup>\n    <\u002Fselect>\n    <button id=\"pasteBtn\" class=\"it-btn\" title=\"Build a tree from a pasted text outline\" style=\"padding:6px 11px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B\">Paste Tree<\u002Fbutton>\n    <div style=\"width:1px;height:22px;background:#e6e2d8;margin:0 2px\"><\u002Fdiv>\n    <button id=\"undoBtn\" class=\"it-btn\" title=\"Undo (Ctrl+Z)\" style=\"width:32px;height:32px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:16px;font-family:inherit;color:#1B1B1B;line-height:1\">↶<\u002Fbutton>\n    <button id=\"redoBtn\" class=\"it-btn\" title=\"Redo (Ctrl+Shift+Z)\" style=\"width:32px;height:32px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:16px;font-family:inherit;color:#1B1B1B;line-height:1\">↷<\u002Fbutton>\n    <div style=\"width:1px;height:22px;background:#e6e2d8;margin:0 2px\"><\u002Fdiv>\n    <button id=\"addNoteBtn\" class=\"it-btn\" title=\"Add a movable text note\" style=\"flex:0 0 92px;width:92px;padding:6px 0;text-align:center;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B\">Note<\u002Fbutton>\n    <select id=\"addShapeSel\" title=\"Add a highlight shape or line\" style=\"flex:0 0 92px;width:92px;padding:6px 0;text-align:center;text-align-last:center;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B;cursor:pointer;appearance:none;-webkit-appearance:none;-moz-appearance:none\">\n      <option value=\"\">Shape<\u002Foption>\n      <option value=\"rect\">Rectangle<\u002Foption>\n      <option value=\"ellipse\">Ellipse<\u002Foption>\n      <option value=\"line\">Line<\u002Foption>\n    <\u002Fselect>\n    <button id=\"numberBtn\" class=\"it-btn\" title=\"Drop a numbered marker\" style=\"flex:0 0 92px;width:92px;padding:6px 0;text-align:center;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B\">Number<\u002Fbutton>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <button id=\"resetBtn\" class=\"it-btn\" title=\"Reset current tree to its default\" style=\"padding:6px 11px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B\">↺ Reset<\u002Fbutton>\n    <button id=\"editBtn\" class=\"it-btn\" style=\"padding:6px 13px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:13px;font-family:inherit;color:#1B1B1B;font-weight:600\">✎ Edit<\u002Fbutton>\n    <button id=\"zoomOut\" class=\"it-btn\" style=\"width:32px;height:32px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:17px;font-family:inherit;color:#1B1B1B;line-height:1\">−<\u002Fbutton>\n    <button id=\"zoomIn\" class=\"it-btn\" style=\"width:32px;height:32px;border:1px solid #ddd9cf;border-radius:7px;background:#fff;font-size:17px;font-family:inherit;color:#1B1B1B;line- t(); this.doRedo(); }\n    });\n    wrap.addEventListener('wheel',(e)=>{\n      e.preventDefault();\n      this.closeNote();\n      const r=wrap.getBoundingClientRect();\n      const f=Math.exp(-e.deltaY*0.0015);\n      this.zoomAt(e.clientX-r.left, e.clientY-r.top, this.zoom*f);\n    },{passive:false});\n    let dragging=false, sx,sy,spx,spy;\n    wrap.addEventListener('mousedown',(e)=>{\n      if(e.target.closest('.node')||e.target.closest('#panel')||e.target.closest('#legend')) return;\n      if(e.target.closest('.anno')||e.target.closest('.anno-handle')||e.target.closest('#annoBar')) return;\n      if(this.selAnno){ this.selAnno=null; this.renderAnnos(); }\n      dragging=true; sx=e.clientX; sy=e.clientY; spx=this.panX; spy=this.panY; wrap.style.cursor='grabbing';\n    });\n    window.addEventListener('mousemove',(e)=>{\n      if(!dragging) return;\n      this.panX=spx+(e.clientX-sx); this.panY=spy+(e.clientY-sy); this.apply();\n    });\n    window.addEventListener('mouseup',()=>{ dragging=false; wrap.style.cursor='grab'; });\n  }\n\n  // ---------- toolbar ----------\n  wireToolbar(){\n    this.q('#treeSel').addEventListener('change',(e)=> this.loadTree(e.target.value));\n    this.q('#editBtn').addEventListener('click',()=>{\n      this.editMode=!this.editMode; this.applyEditStyle();\n      if(!this.editMode){ this.panel.style.display='none'; }\n      else if(this.selectedId){ this.openPanel(this.selectedId); }\n      this.refreshSelection();\n    });\n    this.q('#zoomIn').addEventListener('click',()=>{ const r=this.wrap.getBoundingClientRect(); this.zoomAt(r.width/2,r.height/2,this.zoom*1.2); });\n    this.q('#zoomOut').addEventListener('click',()=>{ const r=this.wrap.getBoundingClientRect(); this.zoomAt(r.width/2,r.height/2,this.zoom/1.2); });\n    this.q('#fitBtn').addEventListener('click',()=> this.fit());\n    this.q('#exportBtn').addEventListener('click',()=> this.exportPNG());\n    this.q('#pasteBtn').addEventListener('click',()=> this.showPasteModal());\n    (()=>{ const ps=this.q('#pageSwitch'); if(ps) ps.addEventListener('change',(e)=>{ const map={hyp:'Hypothesis Tree Builder.dc.html', decision:'Decision Tree Builder.dc.html'}; if(map[e.target.value]) window.location.href=encodeURI(map[e.target.value]); }); })();\n    this.q('#addNoteBtn').addEventListener('click',()=> this.addAnno('note'));\n    this.q('#addShapeSel').addEventListener('change',(e)=>{ const v=e.target.value; e.target.value=''; if(v) this.addAnno(v); });\n    this.q('#numberBtn').addEventListener('click',(e)=>{ e.stopPropagation(); this.showNumberPicker(); });\n    this.q('#undoBtn').addEventListener('click',()=> this.doUndo());\n    this.q('#redoBtn').addEventListener('click',()=> this.doRedo());\n    this.q('#resetBtn').addEventListener('click',()=>{\n      const name=this.q('#treeSel').options[this.q('#treeSel').selectedIndex].text;\n      if(!confirm('Reset “'+name+'” to its original default structure? Your edits to it will be lost.')) return;\n      this.pushUndo(null);\n      delete this.overrides[this.currentKey];\n      this.tree=this.buildPreset(this.currentKey);\n      this.selectedId=null; if(this.panel) this.panel.style.display='none';\n      this._save(); this.render(); requestAnimationFrame(()=> this.fit());\n    });\n    this.updateUndoButtons();\n  }\n  applyEditStyle(){\n    const b=this.q('#editBtn');\n    if(this.editMode){ b.style.background='#CCBA78'; b.style.borderColor='#CCBA78'; b.style.color='#1B1B1B'; b.classList.add('it-prim'); }\n    else { b.style.background='#fff'; b.style.borderColor='#ddd9cf'; b.style.color='#1B1B1B'; b.classList.remove('it-prim'); }\n  }\n  loadTree(key){\n    this.currentKey=key; this.tree=this.getTree(key); this.selectedId=null; this.selAnno=null;\n    this.undo=[]; this.redo=[]; this._coalesceKey=null; this.updateUndoButtons();\n    this.panel.style.display='none'; this._save(); this.render();\n    requestAnimationFrame(()=> this.fit());\n  }\n\n  // ---------- build a tree from a pasted text outline ----------\n  parseTextTree(text){\n    if(!text) return null;\n    const lines = text.replace(/\\t/g,'    ').split(/\\r?\\n/);\n    // leading run of indentation / box-drawing / bullet characters\n    const STRIP = /^[\\s\\u00a0│|┃┆┊├┝┣└┗╰╞─━╌·•◦▪▫▸▹►‣⁃*+]+/;\n    let uid = Date.now();\n    const mk = (label)=>({ id:'p'+(uid++), label, subtitle:'', category:'slate', op:'', conn:'solid', notes:'', collapsed:false, noParentLink:false, children:[] });\n    const items = [];\n    for(const raw of lines){\n      if(!raw.trim()) continue;\n      const m = raw.match(STRIP);\n      const indent = m ? m[0].length : 0;\n      const label = (m ? raw.slice(m[0].length) : raw).trim();\n      if(!label) continue;            // structural-only line (e.g. just │ )\n      items.push({ indent, node: mk(label) });\n    }\n    if(!items.length) return null;\n    // assemble hierarchy with an indent stack (relative indent → depth)\n    const root = items[0].node;\n    const stack = [items[0]];\n    for(let i=1;i<items.length;i++){\n      const it = items[i];\n      while(stack.length>1 && it.indent <= stack[stack.length-1].indent) stack.pop();\n      stack[stack.length-1].node.children.push(it.node);\n      stack.push(it);\n    }\n    // color-code: root neutral, each top branch a distinct hue, descendants inherit\n    const palette = ['revenue','cm','cost','plum','teal','roic','rose','market','profit'];\n    root.category = 'slate';\n    root.children.forEach((c,i)=>{ const cat = palette[i%palette.length]; (function paint(n){ n.category = cat; n.children.forEach(paint); })(c); });\n    return root;\n  }\n  showPasteModal(){\n    if(this._pasteOv) return;\n    const ov = document.createElement('div');\n    Object.assign(ov.style,{position:'fixed',inset:'0',background:'rgba(27,27,27,.45)',zIndex:'100000',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:\"'Segoe UI',system-ui,-apple-system,sans-serif\"});\n    const card = document.createElement('div');\n    Object.assign(card.style,{background:'#fff',borderRadius:'14px',boxShadow:'0 24px 60px rgba(0,0,0,.3)',width:'min(660px,92vw)',maxHeight:'88vh',display:'flex',flexDirection:'column',overflow:'hidden'});\n    card.innerHTML =\n      '<div style=\"padding:18px 22px 14px;border-bottom:1px solid #eee\">'+\n        '<div style=\"font-size:17px;font-weight:700;color:#1B1B1B\">Build tree from text<\u002Fdiv>'+\n        '<div style=\"font-size:12.5px;color:#7a7568;margin-top:5px;line-height:1.5\">Paste an indented outline — use <b>├──<\u002Fb>/<b>└──<\u002Fb> tree characters, spaces, or tabs to show the hierarchy. The first line becomes the root.<\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div style=\"padding:16px 22px;overflow:auto\">'+\n        '<textarea id=\"pasteTA\" spellcheck=\"false\" placeholder=\"Operational Performance&#10;├── Output / Throughput&#10;│   ├── Capacity Constraints&#10;│   │   ├── Equipment capacity&#10;│   │   └── Labor capacity&#10;│   └── Downtime&#10;└── Quality&#10;    └── Defects\" style=\"width:100%;height:320px;box-sizing:border-box;font-family:Menlo,Consolas,monospace;font-size:12.5px;line-height:1.55;padding:12px;border:1px solid #d8dadf;border-radius:9px;color:#1B1B1B;resize:vertical;white-space:pre;overflow:auto;outline:none\"><\u002Ftextarea>'+\n        '<div id=\"pasteErr\" style=\"display:none;color:#9c4326;font-size:12px;margin-top:8px\"><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div style=\"padding:13px 22px 18px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:10px\">'+\n        '<button id=\"pasteCancel\" style=\"padding:8px 16px;border:1px solid #ddd9cf;border-radius:8px;background:#fff;font-size:13px;font-weight:600;font-family:inherit;color:#1B1B1B;cursor:pointer\">Cancel<\u002Fbutton>'+\n        '<button id=\"pasteGo\" style=\"padding:8px 18px;border:1.5px solid #1B1B1B;border-radius:8px;background:#CCBA78;font-size:13px;font-weight:700;font-family:inherit;color:#1B1B1B;cursor:pointer\">Build Tree<\u002Fbutton>'+\n      '<\u002Fdiv>';\n    ov.appendChild(card);\n    document.body.appendChild(ov);\n    this._pasteOv = ov;\n    const ta = card.querySelector('#pasteTA');\n    const err = card.querySelector('#pasteErr');\n    setTimeout(()=> ta.focus(), 30);\n    const close = ()=> this.closePasteModal();\n    card.querySelector('#pasteCancel').addEventListener('click', close);\n    ov.addEventListener('mousedown',(e)=>{ if(e.target===ov) close(); });\n    this._pasteKey = (e)=>{ if(e.key==='Escape') close(); };\n    window.addEventListener('keydown', this._pasteKey);\n    card.querySelector('#pasteGo').addEventListener('click',()=>{\n      const tree = this.parseTextTree(ta.value);\n      if(!tree){ err.textContent='Nothing to build — paste an indented outline first.'; err.style.display='block'; return; }\n      this.applyImportedTree(tree);\n      close();\n    });\n  }\n  closePasteModal(){\n    if(this._pasteOv){ this._pasteOv.remove(); this._pasteOv=null; }\n    if(this._pasteKey){ window.removeEventListener('keydown', this._pasteKey); this._pasteKey=null; }\n  }\n  applyImportedTree(tree){\n    this.currentKey = 'imported';\n    this.tree = tree;\n    this.overrides['imported'] = tree;\n    this.selectedId = null; this.selAnno = null;\n    this.undo = []; this.redo = []; this._coalesceKey = null; this.updateUndoButtons();\n    if(this.editMode){ this.editMode=false; this.applyEditStyle(); }\n    if(this.panel) this.panel.style.display='none';\n    this._save();\n    const sel = this.q('#treeSel'); if(sel) sel.value = 'imported';\n    this.render();\n    requestAnimationFrame(()=> this.fit());\n  }\n\n  // ---------- edit panel ----------\n  openPanel(id){\n    if(!this.editMode){ this.editMode=true; this.applyEditStyle(); }\n    const n=this.allById[id]; if(!n) return;\n    const isRoot = id===this.tree.id;\n    const lab='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#8a8475;margin:14px 0 5px';\n    const inp='width:100%;padding e',mv); window.addEventListener('mouseup',up);\n  }\n  renderAnnoBar(){\n    if(this.annoBar){ this.annoBar.remove(); this.annoBar=null; }\n    if(!this.selAnno) return;\n    const a=(this.tree._annos||[]).find(x=>x.id===this.selAnno); if(!a) return;\n    const bar=document.createElement('div'); bar.id='annoBar';\n    Object.assign(bar.style,{position:'absolute',zIndex:'8',display:'flex',alignItems:'center',gap:'7px',\n      background:'#fff',border:'1.5px solid #d8dadf',borderRadius:'9px',boxShadow:'0 6px 18px rgba(0,0,0,.14)',padding:'6px 9px'});\n    const sep=()=>{ const s=document.createElement('div'); s.style.cssText='width:1px;height:18px;background:#e6e2d8;flex:0 0 auto'; return s; };\n    if(a.kind!=='number'){\n      Object.keys(ANNO_PALETTE).forEach(k=>{\n        const pal=ANNO_PALETTE[k]; const sw=document.createElement('div');\n        Object.assign(sw.style,{width:'18px',height:'18px',borderRadius:'50%',background:pal.stroke,cursor:'pointer',flex:'0 0 auto',\n          boxShadow: a.color===k?'0 0 0 2px #fff,0 0 0 3px #1B1B1B':'0 0 0 1px rgba(0,0,0,.12)'});\n        sw.title=k; sw.addEventListener('click',()=>{ this.pushUndo(null); a.color=k; this.persist(); this.renderAnnos(); });\n        bar.appendChild(sw);\n      });\n    }\n    const mkBtn=(txt,fn,title)=>{ const b=document.createElement('div'); b.textContent=txt; b.title=title||'';\n      Object.assign(b.style,{cursor:'pointer',minWidth:'24px',height:'24px',padding:'0 5px',display:'flex',alignItems:'center',\n        justifyContent:'center',border:'1px solid #ddd9cf',borderRadius:'6px',fontSize:'13px',fontWeight:'700',userSelect:'none',flex:'0 0 auto'});\n      b.addEventListener('click',fn); return b; };\n    if(a.kind==='note'){\n      bar.appendChild(sep());\n      bar.appendChild(mkBtn('A−',()=>{ this.pushUndo(null); a.fontSize=Math.max(10,(a.fontSize||15)-1); this.persist(); this.renderAnnos(); },'Smaller text'));\n      bar.appendChild(mkBtn('A+',()=>{ this.pushUndo(null); a.fontSize=Math.min(42,(a.fontSize||15)+1); this.persist(); this.renderAnnos(); },'Larger text'));\n    }\n    if(a.kind==='line'){\n      bar.appendChild(sep());\n      bar.appendChild(mkBtn('−',()=>{ this.pushUndo(null); a.thickness=Math.max(2,(a.thickness||4)-1); this.persist(); this.renderAnnos(); },'Thinner'));\n      bar.appendChild(mkBtn('+',()=>{ this.pushUndo(null); a.thickness=Math.min(20,(a.thickness||4)+1); this.persist(); this.renderAnnos(); },'Thicker'));\n    }\n    if(a.kind==='number'){\n      bar.appendChild(mkBtn('−',()=>{ this.pushUndo(null); a.size=Math.max(24,(a.size||44)-4); this.persist(); this.renderAnnos(); },'Smaller'));\n      bar.appendChild(mkBtn('+',()=>{ this.pushUndo(null); a.size=Math.min(160,(a.size||44)+4); this.persist(); this.renderAnnos(); },'Larger'));\n    }\n    bar.appendChild(sep());\n    const del=mkBtn('×',()=> this.deleteAnno(a.id),'Delete'); del.style.color='#9c4326'; del.style.fontSize='17px'; del.style.borderColor='#e3b3a1';\n    bar.appendChild(del);\n    this.wrap.appendChild(bar); this.annoBar=bar; this.positionAnnoBar();\n  }\n  positionAnnoBar(){\n    if(!this.annoBar) return;\n    const a=(this.tree._annos||[]).find(x=>x.id===this.selAnno); if(!a){ this.annoBar.remove(); this.annoBar=null; return; }\n    let cx, topY, botExtent;\n    if(a.kind==='line'){ cx=((a.x1+a.x2)/2+this.PAD)*this.zoom+this.panX; topY=(Math.min(a.y1,a.y2)+this.PAD)*this.zoom+this.panY; botExtent=Math.abs(a.y2-a.y1)*this.zoom; }\n    else if(a.kind==='number'){ const s=a.size||44; cx=(a.x+s/2+this.PAD)*this.zoom+this.panX; topY=(a.y+this.PAD)*this.zoom+this.panY; botExtent=s*this.zoom; }\n    else { cx=(a.x+a.w/2+this.PAD)*this.zoom+this.panX; topY=(a.y+this.PAD)*this.zoom+this.panY; botExtent=a.h*this.zoom; }\n    const bw=this.annoBar.offsetWidth||200, bh=this.annoBar.offsetHeight||36;\n    const r=this.wrap.getBoundingClientRect();\n    let left=Math.max(6,Math.min(cx-bw/2, r.width-bw-6));\n    let top=topY-bh-10;\n    if(top<6) top=topY+botExtent+12;\n    this.annoBar.style.left=left+'px'; this.annoBar.style.top=top+'px';\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
