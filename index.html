<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Scaling Roadmap - 10× in 3 Years</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

<style>
  :root {
    --integrity: #1B1B1B;
    --clarity: #FFFFFF;
    --focus: #484848;
    --trust: #EBEAE8;
    --personal: #9E9D9A;
    --prestige: #CCBA78;
    --paper: #F4F1EA;
    --card: #F3F3F3;
    --hair: #d8d6d2;
    --sans: "Barlow", "Helvetica Neue", Arial, sans-serif;
    --sans-cond: "Barlow Condensed", "Barlow", sans-serif;
    --sans-semi: "Barlow Semi Condensed", "Barlow", sans-serif;
    --serif: "Cormorant Garamond", "Georgia", serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--integrity);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.45;
    min-height: 100vh;
    overflow-x: hidden;
  }
</style>

<style>/* ─── LAYOUT ─────────────────────────────────────────────────── */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 24px 48px 20px;
  gap: 18px;
  max-width: 1680px;
  margin: 0 auto;
}

/* ─── TOPBAR ─────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--hair);
  gap: 24px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--integrity);
}
.brand svg, .brand .brand-mark { display: block; height: 27px; width: auto; }
.brand .wordmark {
  font-family: var(--sans-cond);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--integrity);
  padding-left: 2px;
}
.topbar .title-mid {
  display: flex;
  align-items: baseline;
  gap: 14px;
  justify-self: center;
  font-family: var(--serif);
  font-weight: 500;
  line-height: 1;
  white-space: nowrap;
}
.topbar .title-mid .ten {
  color: var(--prestige);
  font-style: italic;
  font-size: 44px;
  letter-spacing: -0.02em;
  padding-right: 2px;
  font-feature-settings: "lnum" on;
}
.topbar .title-mid .ten .x {
  font-style: normal;
  margin-left: 0.04em;
  font-weight: 400;
}
.topbar .title-mid .in {
  font-family: var(--sans-cond);
  font-weight: 300;
  font-style: normal;
  font-size: 20px;
  color: var(--personal);
  text-transform: lowercase;
  letter-spacing: 0;
  padding-left: 2px;
}
.topbar .title-mid .years {
  font-family: var(--serif);
  font-weight: 500;
  font-style: normal;
  color: var(--integrity);
  font-size: 34px;
}
.topbar .meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
}
.topbar .meta .rule {
  width: 28px; height: 1px; background: var(--prestige);
}
.meta-logo { height: 20px; width: auto; display: block; }
.brand-link { display: inline-flex; align-items: center; text-decoration: none; }

/* ─── BOARD ──────────────────────────────────────────────────── */
.board {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 32px;
  align-items: stretch;
  min-height: 0;
}

/* ─── WHEEL COLUMN ───────────────────────────────────────────── */
.wheel-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  min-height: 0;
}
.wheel-wrap {
  position: relative;
  width: 100%;
  max-width: 800px;
  aspect-ratio: 1 / 1;
}
.wheel-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

.wheel-hint {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 10.5px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--personal);
}
.wheel-hint .rule { width: 22px; height: 1px; background: var(--prestige); }

/* Wedges */
.wedge {
  fill: var(--integrity);
  stroke: var(--paper);
  stroke-width: 3;
  cursor: pointer;
  transition: fill 240ms cubic-bezier(.2,.7,.2,1);
}
.wedge:hover { fill: var(--prestige); }
.wedge.selected { fill: var(--prestige); }
.wedge.active { fill: var(--prestige); }

.wedge-title {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
  font-size: 22px;
  fill: var(--clarity);
  pointer-events: none;
  text-anchor: middle;
  transition: fill 200ms ease;
}
.wedge-title.active { fill: var(--integrity); }

.wedge-pillar {
  font-family: var(--sans-cond);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.34em;
  fill: var(--prestige);
  pointer-events: none;
  text-anchor: middle;
  transition: fill 200ms ease;
}
.wedge-pillar.active { fill: var(--clarity); }

/* Hub */
.hub-ring {
  fill: var(--paper);
  stroke: var(--hair);
  stroke-width: 1;
}
.hub-inner {
  fill: var(--clarity);
  stroke: var(--hair);
  stroke-width: 1;
}
.hub-arrow { pointer-events: none; }

.phase-bracket {
  fill: none;
  stroke: var(--prestige);
  stroke-width: 2;
  stroke-linecap: round;
}
.phase-word {
  font-family: var(--sans-cond);
  font-weight: 600;
  font-size: 25px;
  letter-spacing: 0.05em;
  fill: var(--integrity);
  dominant-baseline: middle;
  text-anchor: middle;
  pointer-events: none;
}

.hub-logo-btn {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 10.5%;
  background: none; border: none; padding: 0; margin: 0;
  cursor: pointer;
  display: block;
}
.hub-logo-btn img { width: 100%; height: auto; display: block; }
.hub-logo-btn:focus-visible { outline: 2px solid var(--prestige); outline-offset: 8px; border-radius: 6px; }

/* ─── DETAIL PANEL ───────────────────────────────────────────── */
.detail {
  background: var(--clarity);
  border: 1px solid var(--hair);
  padding: 28px 32px 22px;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  border-radius: 2px;
}
.detail-head { margin-bottom: 8px; }
.detail-num {
  display: flex;
  align-items: flex-end;
  gap: 18px;
}
.detail-num .big {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
  font-size: 96px;
  line-height: 0.82;
  color: var(--prestige);
  letter-spacing: -0.01em;
}
.detail-num .meta-col {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-bottom: 10px;
}
.detail-num .lbl {
  font-family: var(--sans-cond);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--integrity);
  white-space: nowrap;
}
.detail-num .counter-inline {
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
  white-space: nowrap;
}

.detail h2 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.005em;
  color: var(--integrity);
  margin: 8px 0 14px;
  text-wrap: pretty;
}
.detail h2 em {
  font-style: italic;
  font-weight: 500;
  color: var(--focus);
  font-size: 0.78em;
}
.detail .divider {
  height: 1px;
  background: var(--hair);
  margin: 0 0 14px;
}

.section-head {
  font-family: var(--sans-cond);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
  margin: 12px 0 6px;
}
.section-head:first-of-type { margin-top: 0; }
.sections > div + div { margin-top: 4px; }

.bullets {
  list-style: none;
  padding: 0;
  margin: 0 0 4px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.bullets li {
  position: relative;
  padding-left: 18px;
  font-family: var(--sans);
  font-weight: 400;
  font-size: 13.5px;
  line-height: 1.45;
  color: var(--focus);
  text-wrap: pretty;
  animation: bulletIn 380ms cubic-bezier(.2,.7,.2,1) both;
}
.bullets li::before {
  content: "";
  position: absolute;
  left: 1px;
  top: 0.5em;
  width: 6px;
  height: 6px;
  background: var(--paper);
  border: 1.3px solid var(--integrity);
  border-radius: 1px;
  transform: rotate(45deg) scale(0.9);
  opacity: 0.5;
  transition: transform 220ms cubic-bezier(.2,.7,.2,1), background 180ms ease, border-color 180ms ease, opacity 180ms ease;
  z-index: 1;
}
.bullets li:hover::before {
  background: var(--prestige);
  border-color: var(--prestige);
  opacity: 1;
  transform: rotate(45deg) scale(1);
}

/* clickable line-item affordance */
.bullet-row {
  all: unset;
  box-sizing: border-box;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
  cursor: pointer;
  border-radius: 4px;
  margin: -3px -8px -3px -6px;
  padding: 3px 8px 3px 6px;
  transition: background 180ms ease, color 180ms ease;
}
.bullet-text { flex: 1; }
.bullet-row:hover,
.bullet-row:focus-visible {
  background: var(--card);
  color: var(--integrity);
}
.bullet-row:focus-visible { outline: 1px solid var(--integrity); outline-offset: 1px; }
.bullet-go {
  flex: none;
  display: inline-flex;
  align-items: center;
  color: var(--personal);
  opacity: 0.45;
  transform: translateX(-3px);
  transition: opacity 180ms ease, transform 220ms cubic-bezier(.2,.7,.2,1), color 180ms ease;
  align-self: center;
}
.bullet-row:hover .bullet-go,
.bullet-row:focus-visible .bullet-go {
  opacity: 1;
  transform: translateX(0);
  color: var(--prestige);
}
@keyframes bulletIn {
  from { transform: translateY(8px); }
  to   { transform: translateY(0); }
}
.subbullets {
  list-style: none;
  padding: 0;
  margin: 7px 0 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.subbullets li {
  position: relative;
  padding-left: 16px;
  font-family: var(--sans);
  font-weight: 400;
  font-size: 12.5px;
  line-height: 1.4;
  color: var(--focus);
  opacity: 0.82;
  text-wrap: pretty;
  animation: bulletIn 380ms cubic-bezier(.2,.7,.2,1) both;
}
.subbullets li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.62em;
  width: 5px;
  height: 5px;
  border: 1px solid var(--integrity);
  opacity: 0.5;
}

/* footer of detail */
.detail-foot {
  margin-top: auto;
  padding-top: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-top: 1px solid var(--hair);
}
.dots { display: flex; gap: 7px; align-items: center; }
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--personal);
  cursor: pointer;
  padding: 0;
  transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
}
.dot:hover { background: var(--personal); }
.dot.active {
  background: var(--integrity);
  border-color: var(--integrity);
  transform: scale(1.18);
}
.nav-arrows { display: flex; gap: 6px; }
.nav-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--hair);
  color: var(--integrity);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
  border-radius: 2px;
  padding: 0;
  line-height: 1;
}
.nav-btn:hover {
  background: var(--integrity);
  color: var(--clarity);
  border-color: var(--integrity);
}

/* ─── INTRO CARD ─────────────────────────────────────────────── */
.detail.intro {
  padding: 40px 36px 28px;
  justify-content: center;
}
.intro-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
  margin-bottom: 24px;
}
.intro-eyebrow .rule { width: 28px; height: 1px; background: var(--prestige); }

.intro-title {
  font-family: var(--serif);
  font-weight: 500;
  font-style: normal;
  font-size: 64px;
  line-height: 0.96;
  letter-spacing: -0.015em;
  color: var(--integrity);
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.intro-title .intro-line { display: block; }
.intro-title .intro-line + .intro-line { margin-top: -4px; }

.intro-body {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 19px;
  line-height: 1.5;
  color: var(--focus);
  max-width: 44ch;
  margin: 18px 0 0;
  text-align: left;
  text-wrap: pretty;
}
.intro-foot {
  margin-top: auto;
  padding-top: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 10.5px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
  border-top: 1px solid var(--hair);
}
.intro-foot .rule { width: 22px; height: 1px; background: var(--prestige); }

/* ─── PAGE FOOTER ────────────────────────────────────────────── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid var(--hair);
  font-family: var(--sans-cond);
  font-weight: 500;
  font-size: 10.5px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--personal);
}

/* ─── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 1280px) {
  .page { padding: 22px 32px 18px; }
  .board { gap: 24px; }
  .wheel-wrap { max-width: 560px; }
  .topbar .title-mid .ten { font-size: 40px; }
  .topbar .title-mid .years { font-size: 28px; }
  .detail { padding: 22px 26px 18px; }
  .detail-num .big { font-size: 72px; }
  .detail h2 { font-size: 26px; }
  .bullets li { font-size: 13px; }
  .intro-title { font-size: 54px; }
}
@media (max-width: 880px) {
  .page { padding: 18px 22px 14px; }
  .board { grid-template-columns: 1fr; gap: 24px; }
  .wheel-wrap { max-width: 480px; }
  .topbar .title-mid { display: none; }
  .topbar .meta { display: none; }
}
@media (max-width: 560px) {
  .detail { padding: 22px; }
  .detail-num .big { font-size: 64px; }
  .detail h2 { font-size: 24px; }
  .brand .wordmark { display: none; }
  .intro-title { font-size: 46px; }
}
</style>
</head>

/* ─── WHEEL GEOMETRY ───────────────────────────────────────────── */

const R_BR = 350, R_WORD = 390;
const PHASE_WORDS = ["Frame", "Floor", "Focus"];

function polar(r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
}
function wedgePath(i) {
  const c = i * 60, s = c - 30, e = c + 30;
  const [ox1, oy1] = polar(R_OUT, s);
  const [ox2, oy2] = polar(R_OUT, e);
  const [ix2, iy2] = polar(R_IN, e);
  const [ix1, iy1] = polar(R_IN, s);
  return `M ${ox1.toFixed(2)} ${oy1.toFixed(2)}`
       + ` A ${R_OUT} ${R_OUT} 0 0 1 ${ox2.toFixed(2)} ${oy2.toFixed(2)}`
       + ` L ${ix2.toFixed(2)} ${iy2.toFixed(2)}`
       + ` A ${R_IN} ${R_IN} 0 0 0 ${ix1.toFixed(2)} ${iy1.toFixed(2)} Z`;
}

function bracketArc(deg) {
  const half = 57;
  const [x1, y1] = polar(R_BR, deg - half);
  const [x2, y2] = polar(R_BR, deg + half);
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${R_BR} ${R_BR} 0 0 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}

/* ─── SCALING MARK (placeholder - swap in real logo asset) ─────── */
function LogoMark({ className }) {

    <svg className={className} viewBox="0 0 100 100" aria-hidden="true">

}

/* ─── WHEEL ────────────────────────────────────────────────────── */
function Wheel({ active, hovered, onHover, onSelect, onReset }) {
  const displayed = hovered ?? active;

  // Safety net: whenever the pointer moves onto anything that is NOT a wedge
  // (the hub, the gaps, the detail panel, the page body) clear the hover. This
  // is hit-test based - it reads the real event target rather than doing any
  // coordinate math - so it is immune to the wheel shifting as the detail panel
  // resizes, and it catches the case where a wedge's own leave event is dropped
  // (which left the next wedge clockwise stranded as "hovered").
  useEffect(() => {
    function onOver(e) {
      const t = e.target;
      if (!(t instanceof Element) || !t.classList.contains("wedge")) onHover(null);
    }
    function clear() { onHover(null); }
    document.addEventListener("pointerover", onOver);
    document.addEventListener("pointerleave", clear);
    document.addEventListener("pointercancel", clear);
    window.addEventListener("blur", clear);
    return () => {
      document.removeEventListener("pointerover", onOver);
      document.removeEventListener("pointerleave", clear);
      document.removeEventListener("pointercancel", clear);
      window.removeEventListener("blur", clear);
    };
  }, [onHover]);

  return (
    <svg className="wheel-svg" viewBox="-90 -90 860 860" aria-label="Six-pillar scaling roadmap">
      {PHASES.map((p, i) => {
        const [lx, ly] = polar(R_LABEL, i * 60);
        const disp = displayed === i;
        const sel = active === i && hovered == null;
        const a = disp ? " active" : "";
        return (
          <g key={i}>
            <path className={"wedge" + (sel ? " selected" : "") + a} d={wedgePath(i)}
                  onPointerEnter={() => onHover(i)}
                  onPointerLeave={() => onHover(null)}
                  onClick={() => onSelect(i)} />
            <text className={"wedge-title" + a} x={lx} y={ly - 2}>{p.short}</text>
            <text className={"wedge-pillar" + a} x={lx} y={ly + 23}>{p.label.toUpperCase()}</text>
          </g>
        );
      })}

      {PHASE_WORDS.map((w, i) => {
        const c = 30 + i * 120;
        const [wx, wy] = polar(R_WORD, c);
        return (
          <g key={w}>
            <path className="phase-bracket" d={bracketArc(c)} />
            <text className="phase-word" x={wx} y={wy}>{w}</text>
          </g>
        );
      })}
      <circle className="hub-ring" cx={CX} cy={CY} r={118} />
      <circle className="hub-inner" cx={CX} cy={CY} r={94} />
    </svg>
  );
}

/* ─── DETAIL ───────────────────────────────────────────────────── */
function Detail({ idx, onPrev, onNext, onJump, onBack }) {
  const phase = PHASES[idx];
  const titleParts = phase.title.split(" - ");
  return (
    <aside className="detail" data-screen-label={"Detail " + phase.n} key={idx}>
      <div className="detail-head">
        <div className="detail-num">
          <div className="big">{phase.n}</div>
          <div className="meta-col">
            <div className="lbl">{phase.label.toUpperCase()}</div>
            <div className="counter-inline">{(idx + 1).toString().padStart(2, "0")} / 06</div>
          </div>
        </div>
      </div>

      <h2>
        {titleParts[0]}
        {titleParts[1] ? <><br/><em>- {titleParts[1]}</em></> : null}
      </h2>
      <div className="divider"></div>

      <div className="sections">
        {phase.sections.map((s, si) => (
          <div key={si}>
            {s.heading ? <div className="section-head">{s.heading}</div> : null}
            <ul className="bullets">
              {s.bullets.map((b, bi) => {
                const label = typeof b === "string" ? b : b.text;
                const subs  = typeof b === "string" ? null : b.subs;
                return (
                  <li key={bi} style={{ animationDelay: `${60 + bi * 40}ms` }}>
                    <button type="button" className="bullet-row"
                            title="Open tool — coming soon">
                      <span className="bullet-text">{label}</span>
                      <span className="bullet-go" aria-hidden="true">
                        <svg viewBox="0 0 16 16" width="13" height="13">
                          <path d="M4 8h7M8 4.5 11.5 8 8 11.5" fill="none"
                                stroke="currentColor" strokeWidth="1.4"
                                strokeLinecap="round" strokeLinejoin="round"></path>
                        </svg>
                      </span>
                    </button>
                    {subs ? (
                      <ul className="subbullets">
                        {subs.map((sb, sbi) => (
                          <li key={sbi} style={{ animationDelay: `${60 + (bi + sbi) * 40}ms` }}>{sb}</li>
                        ))}
                      </ul>
                    ) : null}
                  </li>
                );
              })}
            </ul>
          </div>
        ))}
      </div>

      <div className="detail-foot">
        <div className="dots">
          {PHASES.map((p, i) => (
            <button key={i}
                    className={"dot" + (i === idx ? " active" : "")}
                    onClick={() => onJump(i)}
                    aria-label={"Go to " + p.label}></button>
          ))}
        </div>
        <div className="nav-arrows">
          <button className="nav-btn" onClick={onPrev} aria-label="Previous pillar">‹</button>
          <button className="nav-btn" onClick={onNext} aria-label="Next pillar">›</button>
        </div>
      </div>
    </aside>
  );
}

/* ─── INTRO CARD ───────────────────────────────────────────────── */
function Intro() {
  return (
    <aside className="detail intro" key="intro">
      <h1 className="intro-title">
        <span className="intro-line">The Scaling</span>
        <span className="intro-line">Roadmap</span>
      </h1>
      <p className="intro-body">
        Six pillars every business must navigate within the scaling framework to realize scale.
        Progression and speed varies by maturity, slack, and strategy to date.
      </p>
    </aside>
  );
}

/* ─── APP ──────────────────────────────────────────────────────── */

  const [hovered, setHovered] = useState(null);

  useEffect(() => {
    function onKey(e) {
      if (e.key === "ArrowRight") setSelected(i => (i == null ? 0 : (i + 1) % 6));
      if (e.key === "ArrowLeft")  setSelected(i => (i == null ? 5 : (i + 5) % 6));
      if (e.key === "Escape")     setSelected(null);
